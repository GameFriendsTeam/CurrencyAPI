name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Описание релиза'
        required: false
        default: 'Новый релиз'
        type: string
      prerelease:
        description: 'Пререлиз?'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: PHPStan analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.1"
          - "8.2"
          - "8.3"

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: pmmp/setup-php-action@3.2.0
        with:
          php-version: ${{ matrix.php }}
          install-path: "./bin"
          tools: phpstan
          pm-version-major: 5

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: php-${{ matrix.php }}-${{ runner.os }}-php-${{ hashFiles('**/composer.json') }}
  
      - name: update autoload or Install dependencies
        run: (test -d vendor && (composer dump-autoload)) || (composer install --prefer-dist --no-progress)

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyze --no-progress --memory-limit=2G
  compile:
    name: Compile
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: pmmp/setup-php-action@3.2.0
        with:
          php-version: "8.3"
          install-path: "./bin"
          pm-version-major: 5

      - name: Execute build
        run: php compiler.php

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: CurrencyAPI v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: build/*.phar
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

